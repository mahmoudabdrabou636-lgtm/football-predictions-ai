version: "3.9"

services:

  database:
    image: postgres:16
    container_name: football_predictions_db
    restart: always
    environment:
      POSTGRES_USER: fpai_user
      POSTGRES_PASSWORD: fpai_password
      POSTGRES_DB: football_predictions
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: football_predictions_api
    restart: always
    depends_on:
      - database
    ports:
      - "8000:8000"
    env_file:
      - .env


volumes:
  postgres_data:
